<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ═══════════════════════════════════════════════════
     HEAD fragment
     ═══════════════════════════════════════════════════ -->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — OrgManager'">OrgManager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</th:block>

<!-- ═══════════════════════════════════════════════════
     TOP NAVIGATION fragment
     Call as: th:replace="~{fragments/commons :: topnav}"
     ═══════════════════════════════════════════════════ -->
<nav th:fragment="topnav" class="topnav">

    <!-- Brand -->
    <a th:href="@{/dashboard}" class="topnav-brand">
        <div class="brand-icon"><i class="bi bi-building-check"></i></div>
        <div>
            <span class="brand-name">OrgManager</span>
            <span class="brand-tagline">Система управления</span>
        </div>
    </a>

    <!-- Navigation links -->
    <div class="topnav-nav">
        <a th:href="@{/dashboard}"
           th:classappend="${requestURI.startsWith('/dashboard')} ? ' active' : ''"
           class="topnav-link">
            <i class="bi bi-grid-1x2-fill"></i><span>Главное</span>
        </a>

        <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
           th:href="@{/users}"
           th:classappend="${requestURI.startsWith('/users')} ? ' active' : ''"
           class="topnav-link">
            <i class="bi bi-people-fill"></i><span>Сотрудники</span>
        </a>

        <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
           th:href="@{/departments}"
           th:classappend="${requestURI.startsWith('/departments')} ? ' active' : ''"
           class="topnav-link">
            <i class="bi bi-building"></i><span>Отделы</span>
        </a>

        <a th:href="@{/documents}"
           th:classappend="${requestURI.startsWith('/documents')} ? ' active' : ''"
           class="topnav-link">
            <i class="bi bi-file-earmark-text-fill"></i><span>Документы</span>
        </a>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/audit}"
           th:classappend="${requestURI.startsWith('/audit')} ? ' active' : ''"
           class="topnav-link">
            <i class="bi bi-journal-check"></i><span>Журнал аудита</span>
        </a>

        <a sec:authorize="hasRole('ADMIN')"
           href="/swagger-ui.html" target="_blank" class="topnav-link">
            <i class="bi bi-code-square"></i><span>API</span>
        </a>
    </div>

    <!-- User info + logout -->
    <div class="topnav-user">
        <div class="topnav-avatar"
             th:text="${currentUser?.fullName != null ? currentUser.fullName.substring(0,1).toUpperCase() : 'U'}">U</div>
        <div class="topnav-user-info d-none d-lg-block">
            <span class="topnav-user-name" th:text="${currentUser?.fullName ?: 'Пользователь'}">User</span>
            <span class="topnav-user-role"
                  th:text="${currentUser?.role == 'ADMIN'     ? 'Администратор' :
                             currentUser?.role == 'MANAGER'   ? 'Менеджер' :
                             currentUser?.role == 'EMPLOYEE'  ? 'Сотрудник' : ''}">Роль</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="topnav-logout" title="Выйти">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </form>
    </div>
</nav>

<!-- ═══════════════════════════════════════════════════
     ALERTS fragment — flash messages
     ═══════════════════════════════════════════════════ -->
<th:block th:fragment="alerts">
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2"
         role="alert">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2"
         role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</th:block>

<!-- ═══════════════════════════════════════════════════
     SCRIPTS fragment
     ═══════════════════════════════════════════════════ -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
