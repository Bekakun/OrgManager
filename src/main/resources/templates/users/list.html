<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head th:replace="~{fragments/commons :: head('Сотрудники')}"></head>
<body class="app-body">

<aside th:replace="~{fragments/commons :: sidebar}"></aside>

<main class="main-content">

    <th:block th:replace="~{fragments/commons :: alerts}"></th:block>

    <!-- Header -->
    <div class="content-header">
        <div>
            <h1 class="content-title">Сотрудники</h1>
            <p class="page-subtitle" th:text="${usersPage.totalElements} + ' записей'">0 записей</p>
        </div>
        <div class="content-actions">
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/users/new}"
               class="btn btn-primary">
                <i class="bi bi-person-plus-fill me-1"></i>Добавить сотрудника
            </a>
        </div>
    </div>

    <!-- Filters (auto-submit on change) -->
    <div class="card">
        <div class="card-body py-2">
            <form th:action="@{/users}" method="get" class="row g-2 align-items-end" id="usersFilterForm">
                <div class="col-md-4">
                    <label class="form-label mb-1 small">Отдел</label>
                    <select name="departmentId" class="form-select form-select-sm"
                            onchange="document.getElementById('usersFilterForm').submit()">
                        <option value="">Все отделы</option>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}"
                                th:selected="${dept.id == selectedDept}">Отдел</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label mb-1 small">Роль</label>
                    <select name="role" class="form-select form-select-sm"
                            onchange="document.getElementById('usersFilterForm').submit()">
                        <option value="">Все роли</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}"
                                th:selected="${r == selectedRole}">ROLE</option>
                    </select>
                </div>
                <div class="col-auto">
                    <a th:href="@{/users}" class="btn btn-outline-secondary btn-sm"
                       title="Сбросить фильтры">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${usersPage.isEmpty()}" class="empty-state">
                <i class="bi bi-people"></i>
                <h5>Сотрудники не найдены</h5>
                <p>Попробуйте изменить параметры фильтрации</p>
            </div>
            <table th:unless="${usersPage.isEmpty()}" class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Сотрудник</th>
                        <th>Должность</th>
                        <th>Отдел</th>
                        <th>Роль</th>
                        <th>Статус</th>
                        <th sec:authorize="hasRole('ADMIN')">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${usersPage.content}">
                        <td class="text-muted" th:text="${user.id}">1</td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="avatar-sm"
                                     th:text="${user.fullName.substring(0,1).toUpperCase()}">A</div>
                                <div>
                                    <div class="fw-500" th:text="${user.fullName}">ФИО</div>
                                    <div class="text-muted small" th:text="${user.email}">email</div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${user.position ?: '—'}">Должность</td>
                        <td>
                            <span th:if="${user.departmentName != null}"
                                  class="badge bg-light text-secondary border"
                                  th:text="${user.departmentName}">Отдел</span>
                            <span th:unless="${user.departmentName != null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:class="'badge ' + (${user.role == 'ADMIN'} ? 'bg-danger' : (${user.role == 'MANAGER'} ? 'bg-warning text-dark' : 'bg-secondary'))"
                                  th:text="${user.role}">ROLE</span>
                        </td>
                        <td>
                            <span th:class="'badge ' + (${user.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary')"
                                  th:text="${user.status == 'ACTIVE'} ? 'Активен' : 'Неактивен'">Статус</span>
                        </td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <div class="d-flex gap-1">
                                <a th:href="@{/users/{id}/edit(id=${user.id})}"
                                   class="btn btn-sm btn-outline-primary" title="Редактировать">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:if="${user.status == 'ACTIVE'}"
                                      th:action="@{/users/{id}/deactivate(id=${user.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            title="Деактивировать"
                                            onclick="return confirm('Деактивировать сотрудника?')">
                                        <i class="bi bi-person-x"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${usersPage.totalPages > 1}" class="d-flex justify-content-center align-items-center gap-1">
        <a th:href="@{/users(departmentId=${selectedDept}, role=${selectedRole}, page=${currentPage - 1})}"
           th:classappend="${currentPage == 0} ? ' disabled' : ''"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-left"></i>
        </a>
        <span th:if="${startPage > 0}">
            <a th:href="@{/users(departmentId=${selectedDept}, role=${selectedRole}, page=0)}"
               class="btn btn-outline-secondary btn-sm">1</a>
            <span th:if="${startPage > 1}" class="text-muted px-1">…</span>
        </span>
        <span th:each="p : ${#numbers.sequence(startPage, endPage)}">
            <a th:href="@{/users(departmentId=${selectedDept}, role=${selectedRole}, page=${p})}"
               th:classappend="${p == currentPage} ? ' active' : ''"
               th:text="${p + 1}"
               class="btn btn-outline-secondary btn-sm">1</a>
        </span>
        <span th:if="${endPage < usersPage.totalPages - 1}">
            <span th:if="${endPage < usersPage.totalPages - 2}" class="text-muted px-1">…</span>
            <a th:href="@{/users(departmentId=${selectedDept}, role=${selectedRole}, page=${usersPage.totalPages - 1})}"
               class="btn btn-outline-secondary btn-sm" th:text="${usersPage.totalPages}">N</a>
        </span>
        <a th:href="@{/users(departmentId=${selectedDept}, role=${selectedRole}, page=${currentPage + 1})}"
           th:classappend="${currentPage + 1 >= usersPage.totalPages} ? ' disabled' : ''"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-right"></i>
        </a>
    </div>

</main>
<th:block th:replace="~{fragments/commons :: scripts}"></th:block>
</body>
</html>
