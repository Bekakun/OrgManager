spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orgmanager
    username: postgres
    password: Beka2004*
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema; Hibernate only validates
    show-sql: false
    open-in-view: false           # Avoid LazyInitializationException anti-pattern
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# ── Application-specific properties ──────────────────────────────────────────
app:
  jwt:
    # Replace with: openssl rand -base64 32  (must be ≥256-bit Base64 string)
    secret: dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWZvci1vcmdtYW5hZ2VyLWFwcA==
    expiration-ms: 86400000      # 24 hours
  upload:
    dir: ./uploads               # Directory for uploaded document files

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always

# ── Springdoc / Swagger ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    kz.masku.orgmanager: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
