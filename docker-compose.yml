services:

  # ── PostgreSQL 15 ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: orgmanager-db
    environment:
      POSTGRES_DB:       orgmanager
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: Beka2004*
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orgmanager"]
      interval: 5s
      timeout: 5s
      retries: 12        # wait up to 60 s for Postgres to be ready
    restart: unless-stopped

  # ── Spring Boot Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orgmanager-app
    ports:
      - "8080:8080"
    environment:
      # ── Database (overrides application.yml) ──────────────────────────────────
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/orgmanager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Beka2004*

      # ── Flyway ────────────────────────────────────────────────────────────────
      SPRING_FLYWAY_ENABLED:             "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"

      # ── JWT secret (≥ 256-bit Base64 — change in production!) ─────────────────
      APP_JWT_SECRET: dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWZvci1vcmdtYW5hZ2VyLWFwcA==

      # ── File uploads ──────────────────────────────────────────────────────────
      APP_UPLOAD_DIR: /app/uploads

      # ── JVM memory ────────────────────────────────────────────────────────────
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"

    depends_on:
      db:
        condition: service_healthy   # app starts only after Postgres passes health check
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

# ── Named volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # persistent DB data — survives container restart
  uploads:         # persistent uploaded files
